name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.9.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
      RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
      RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
      RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v4
      - name: Bootstrap pinned Gradle wrapper
        run: bash bootstrap-wrapper.sh
      - name: Fetch pinned mpv native libraries
        run: bash native/fetch_mpv_native.sh
      - name: Decode release keystore
        if: env.RELEASE_KEYSTORE_BASE64 != ''
        run: |
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
          echo "RELEASE_STORE_FILE=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon :app:assembleRelease
      - name: Stage APK
        run: |
          mkdir -p dist
          signed=app/build/outputs/apk/release/app-release.apk
          unsigned=app/build/outputs/apk/release/app-release-unsigned.apk
          if [ -f "$signed" ]; then
            cp "$signed" "dist/upscale-relay-android-${TAG}.apk"
          elif [ -f "$unsigned" ]; then
            echo "::warning::No signing secrets configured; publishing an unsigned APK."
            cp "$unsigned" "dist/upscale-relay-android-${TAG}-unsigned.apk"
          else
            echo "::error::No release APK was produced."
            exit 1
          fi
      - name: Remove decoded keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/release.jks"
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG" \
            --title "Upscale Relay Android $TAG" \
            --generate-notes \
            --notes "Playback history no longer jumps to 100% when the server connection drops mid-file (for example when the tablet sleeps and the relay disconnects): a mid-file end-of-stream now keeps the real watched position, and only a genuine end-of-file near the duration pins the entry at 100%. Files can also be marked as fully watched directly from the library, local browser, and recents lists with a long-press. Unsigned release APK; sign it before distribution or sideload as-is for personal use." \
            dist/*.apk
