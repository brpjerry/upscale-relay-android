name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.9.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
      RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
      RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      # A key alias is not sensitive, and holding it as a secret made Actions
      # redact the string everywhere it appeared — including inside the
      # published APK's filename in the logs.
      RELEASE_KEY_ALIAS: ${{ vars.RELEASE_KEY_ALIAS }}
      RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v4
      - name: Bootstrap pinned Gradle wrapper
        run: bash bootstrap-wrapper.sh
      - name: Fetch pinned mpv native libraries
        run: bash native/fetch_mpv_native.sh
      - name: Decode release keystore
        if: env.RELEASE_KEYSTORE_BASE64 != ''
        run: |
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
          echo "RELEASE_STORE_FILE=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon :app:assembleRelease
      - name: Stage APK
        run: |
          mkdir -p dist
          signed=app/build/outputs/apk/release/app-release.apk
          unsigned=app/build/outputs/apk/release/app-release-unsigned.apk
          if [ -f "$signed" ]; then
            cp "$signed" "dist/upscale-relay-android-${TAG}.apk"
          elif [ -f "$unsigned" ]; then
            echo "::warning::No signing secrets configured; publishing an unsigned APK."
            cp "$unsigned" "dist/upscale-relay-android-${TAG}-unsigned.apk"
          else
            echo "::error::No release APK was produced."
            exit 1
          fi
      - name: Remove decoded keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/release.jks"
      # Prose for a release lives in release-notes/<tag>.md (optional). Without
      # one, the release carries the generated changelog plus the signing line.
      # The signing line is derived from the artifact actually built, so it can
      # never claim the wrong thing the way hardcoded notes did.
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          apk=$(ls dist/*.apk)
          case "$apk" in
            *-unsigned.apk)
              signing_note="Unsigned release APK; sign it before distribution or sideload as-is for personal use."
              ;;
            *)
              signing_note="Signed release APK."
              ;;
          esac
          notes_file="release-notes/${TAG}.md"
          if [ -f "$notes_file" ]; then
            printf '%s\n\n%s\n' "$(cat "$notes_file")" "$signing_note" > "$RUNNER_TEMP/notes.md"
          else
            printf '%s\n' "$signing_note" > "$RUNNER_TEMP/notes.md"
          fi
          gh release create "$TAG" \
            --title "Upscale Relay Android $TAG" \
            --generate-notes \
            --notes-file "$RUNNER_TEMP/notes.md" \
            dist/*.apk
