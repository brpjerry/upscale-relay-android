name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.5.5)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v4
      - name: Bootstrap pinned Gradle wrapper
        run: bash bootstrap-wrapper.sh
      - name: Fetch pinned mpv native libraries
        run: bash native/fetch_mpv_native.sh
      - name: Build release APK (unsigned)
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon :app:assembleRelease
      - name: Stage APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release-unsigned.apk \
            "dist/upscale-relay-android-${TAG}-unsigned.apk"
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG" \
            --title "Upscale Relay Android $TAG" \
            --generate-notes \
            --notes "Unsigned release APK. Sign it before distribution; sideload as-is for personal use." \
            dist/*.apk
