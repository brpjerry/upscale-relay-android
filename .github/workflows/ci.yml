name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v4
      - name: Bootstrap pinned Gradle wrapper
        run: bash bootstrap-wrapper.sh
      - name: Fetch pinned mpv native libraries
        run: bash native/fetch_mpv_native.sh
      - name: Tests, lint, and debug APK
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon \
            :relay-protocol:test :relay-client:test :relay-demux:test \
            :player-mpv:test :app:testDebugUnitTest :app:lintDebug \
            :app:assembleDebug
      - uses: actions/upload-artifact@v7
        with:
          name: upscale-relay-android-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
